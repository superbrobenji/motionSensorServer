services:
  kafka:
    container_name: kafka
    hostname: kafka
    image: bitnami/kafka
    ports:
      - 9092:9092
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://kafka:9094
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kafka-net

  jupyter:
    image: jupyter/scipy-notebook:latest
    depends_on:
      - kafka
    volumes:
      - ./logging:/home/jovyan/work
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
    networks:
      - kafka-net

  orchistrator:
    build: ./orchistrator
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./orchistrator:/orchistrator
      - "/dev:/dev" # Mount entire /dev directory for device access
      - "/sys:/sys" # Mount entire /sys for device information
      - "/run/udev:/run/udev:ro" # Mount udev for device management
    ports:
      - "8080:8080"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0:rwm" # Bind mount the actual device with explicit permissions
    privileged: true # Required for USB and serial port access
    user: "0:0" # Run as root to access USB devices
    group_add:
      - "20" # Add dialout group (typically GID 20)
    cap_add:
      - SYS_ADMIN # System administration capabilities
    security_opt:
      - apparmor:unconfined # Disable AppArmor restrictions
      - seccomp:unconfined # Disable seccomp restrictions
    environment:
      - SERIAL_PORT=${SERIAL_PORT:-/dev/ttyUSB0} # Override with env var if needed
      - BAUD_RATE=${BAUD_RATE:-115200}
      - API_PORT=${API_PORT:-8080}
      - KAFKA_BROKER=kafka:9092
      - API_KEY=${API_KEY:?API_KEY is required}
    networks:
      - kafka-net
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    depends_on:
      orchistrator:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://orchistrator:8080
      - VITE_API_KEY=${API_KEY:?API_KEY is required}
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge
