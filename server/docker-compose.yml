services:
  kafka:
    container_name: kafka
    hostname: kafka
    image: bitnami/kafka
    ports:
      - 9092:9092
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://kafka:9094
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kafka-net

  jupyter:
    image: jupyter/scipy-notebook:latest
    depends_on:
      - kafka
    volumes:
      - ./logging:/home/jovyan/work
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
    networks:
      - kafka-net

  orchestrator:
    build: ./orchestrator
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - orchestrator_data:/app/data
    ports:
      - "8080:8080"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    group_add:
      - "20"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - SERIAL_PORT=${SERIAL_PORT:-/dev/ttyUSB0}
      - BAUD_RATE=${BAUD_RATE:-115200}
      - API_PORT=${API_PORT:-8080}
      - KAFKA_BROKER=kafka:9092
      - API_KEY=${API_KEY:?API_KEY is required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:3001}
      - NODE_REGISTRY_PATH=data/nodes.json
      - ZONE_REGISTRY_PATH=data/zones.json
      - AUTH_REGISTRY_PATH=data/nodeauth.json
    networks:
      - kafka-net
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    depends_on:
      orchestrator:
        condition: service_healthy
    ports:
      - "3000:3000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      - VITE_API_URL=http://orchestrator:8080
      - VITE_API_KEY=${API_KEY:?API_KEY is required}
    networks:
      - kafka-net

  artist-portal:
    build:
      context: ./artist-portal
      args:
        VITE_API_URL: ${ARTIST_API_URL:-http://localhost:8080}
    ports:
      - "3001:3001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    networks:
      - kafka-net
    restart: unless-stopped

networks:
  kafka-net:
    driver: bridge

volumes:
  orchestrator_data:
